<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: #0f172a;
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      main {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 50px 20px;
      }

      /* Contact Form */

      #contact-form {
        width: 100%;
        max-width: 500px;
        background: #1e293b;
        padding: 30px;
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      #contact-form label {
        font-weight: bold;
      }

      #contact-form input,
      #contact-form textarea {
        padding: 12px;
        border: 1px solid #475569;
        border-radius: 5px;
        background: #0f172a;
        color: white;
        font-size: 1rem;
        outline: none;
      }

      #contact-form input:focus,
      #contact-form textarea:focus {
        border-color: #3b82f6;
      }

      #contact-form textarea {
        resize: none;
      }

      #contact-form button {
        padding: 12px;
        border: none;
        border-radius: 5px;
        background: #2563eb;
        color: white;
        cursor: pointer;
        font-size: 1rem;
        transition: 0.3s;
      }

      #contact-form button:hover {
        background: #1d4ed8;
      }

      /* Footer */

      footer {
        background: #111827;
        padding: 25px;
      }

      .footer_links {
        display: flex;
        justify-content: center;
        gap: 25px;
        flex-wrap: wrap;
      }

      .footer_links a {
        text-decoration: none;
        color: #cbd5e1;
        transition: 0.3s;
      }

      .footer_links a:hover {
        color: white;
      }

      footer hr {
        margin: 20px 0;
        border: none;
        border-top: 1px solid #374151;
      }

      footer p {
        text-align: center;
        color: #94a3b8;
      }

      /* Responsive */

      @media (max-width: 600px) {
        #contact-form {
          padding: 20px;
        }

        .footer_links {
          flex-direction: column;
          gap: 12px;
          text-align: center;
        }
      }
    </style>
    <link rel="stylesheet" href="style.css" class="css" />
  </head>

  <body>
    <header>
      <nav class="navbar">
        <div class="navbar_container">
          <div class="logo"><p>Lorem ipsum dolor.</p></div>
          <div class="navlinks">
            <ul>
              <li><a href="">Home</a></li>
              <li><a href="">About</a></li>
              <li><a href="">Contact</a></li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <form id="contact-form">
        <label for="name">Name</label>
        <input
          id="name"
          type="text"
          name="name"
          placeholder="Jane Doe"
          required
        />

        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          name="email"
          placeholder="jane@example.com"
          required
        />

        <label for="message">Message</label>
        <textarea
          id="message"
          name="message"
          placeholder="How can we help?"
        ></textarea>

        <button type="submit">Send Message</button>
      </form>
    </main>
    <footer>
      <div class="footer_container">
        <div class="footer_links">
          <a href="">Resume</a>
          <a href="" id="contactmee">Contact Me</a>
          <a href="">GitHub</a>
          <a href="">LinkedIn</a>
          <a href="">LeetCode</a>
          <a href="">YouTube</a>
          <a href="">Email</a>
        </div>

        <hr />

        <p>© 2026 Gaurav Joshi. Built with HTML, CSS & JavaScript.</p>
      </div>
    </footer>
    <script>
      const form = document.getElementById("contact-form");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const formData = Object.fromEntries(new FormData(form).entries());

        try {
          const response = await fetch(
            "https://postdrop.onrender.com/api/entries/submit",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer 14ec43987e269b6c",
              },
              body: JSON.stringify(formData),
            },
          );

          const result = await response.json();

          if (result.success) {
            alert("Message sent successfully!");
            form.reset();
          } else {
            alert(result.message || "Submission failed.");
          }
        } catch (error) {
          console.error(error);
          alert("Something went wrong.");
        }
      });
    </script>
  </body>
</html>
